<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeAl's AI Assistant | AI для малого бизнеса</title>
  <meta
    name="description"
    content="DeAl's AI Assistant — AI-ассистент для малого бизнеса. Работа с файлами, поиск информации, ответы на вопросы и автоматизация рутинных задач."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <nav class="navbar">
  <div class="container nav-container">
    <div class="logo">DeAl's AI Assistant</div>
    <div class="nav-links">
  <a href="features.html">Возможности</a>
  <a href="audience.html">Для кого</a>
  <a href="benefits.html">Польза</a>
  <a href="contacts.html">Контакты</a>
</div>
  </div>
</nav>
 
<div class="chat-box" id="chat-box">
  <div class="chat-message assistant">
    <div class="message-label">AI Assistant</div>
    <div class="message-text">
      Привет! Я готов помочь с задачами, текстами и рабочими вопросами.
    </div>
  </div>
</div>

<div class="demo-form">
  <input
    type="text"
    id="demo-input"
    placeholder="Напишите сообщение..."
  />
  <button id="demo-btn">Отправить</button>
  <button id="clear-chat-btn" type="button">Очистить чат</button>
</div>


<div class="file-form">
  <input type="file" id="txt-file-input" accept=".txt" />
  <button id="upload-btn">Загрузить TXT</button>
</div>

<div class="file-form">
  <input type="file" id="pdf-file-input" accept=".pdf" />
  <button id="upload-pdf-btn">Загрузить PDF</button>
</div>

<div class="file-form">
  <input type="file" id="docx-file-input" accept=".docx" />
  <button id="upload-docx-btn">Загрузить DOCX</button>
</div>

<div class="current-file-box">
  <div id="current-file-text">Текущий файл: не выбран</div>
  <button id="clear-file-btn" type="button">Очистить файл</button>
</div>

<div class="demo-examples">
  <span>Примеры:</span>
  <button class="example-btn" data-text="Помоги написать ответ клиенту">ответ клиенту</button>
  <button class="example-btn" data-text="Сделай краткий деловой текст">краткий текст</button>
  <button class="example-btn" data-text="Объясни простыми словами преимущества AI-ассистента">объяснение</button>
</div>

<div class="task-modes">
  <span>Режимы задач:</span>
  <button class="task-btn" data-mode="client-reply">Ответ клиенту</button>
  <button class="task-btn" data-mode="short">Кратко</button>
  <button class="task-btn" data-mode="simple">Объяснить просто</button>
  <button class="task-btn" data-mode="steps">Список шагов</button>
</div>


<div class="file-question-form">
  <input
    type="text"
    id="file-question-input"
    placeholder="Задайте вопрос по последнему загруженному файлу..."
  />
  <button id="file-question-btn">Спросить по файлу</button>
</div>



<p id="demo-response" class="demo-response"></p>


    </div>
  </header>

  
  </main>
  <footer class="footer">
  <div class="container">
    <p>© 2026 DeAl's AI Assistant. Проект AI-ассистента для малого бизнеса.</p>
  </div>
</footer>


  <script src="script.js"></script>
</body>
</html>
