<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Аккаунт | DeAl's AI Assistant</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">
        <a href="index.html" style="color: inherit; text-decoration: none;">DeAl's AI Assistant</a>
      </div>
      <div class="nav-links">
        <a href="index.html">Главная</a>
        <a href="features.html">Возможности</a>
        <a href="audience.html">Для кого</a>
        <a href="benefits.html">Польза</a>
        <a href="contacts.html">Контакты</a>
        <a href="auth.html">Аккаунт</a>
      </div>
    </div>
  </nav>

  <main class="section">
    <div class="container">
      <h2>Аккаунт</h2>

      <div class="auth-page-panel">
        <div class="auth-card" id="register-card">
          <h3>Регистрация</h3>
          <input type="text" id="register-name" placeholder="Имя" />
          <input type="email" id="register-email" placeholder="Email" />
          <input type="password" id="register-password" placeholder="Пароль" />
          <button id="register-btn" type="button">Зарегистрироваться</button>
        </div>

        <div class="auth-card" id="login-card">
          <h3>Вход</h3>
          <input type="email" id="login-email" placeholder="Email" />
          <input type="password" id="login-password" placeholder="Пароль" />
          <button id="login-btn" type="button">Войти</button>
        </div>

        <div class="auth-card">
          <h3>Текущий пользователь</h3>
          <div id="current-user-box">Пользователь не вошел</div>
          <button id="logout-btn" type="button">Выйти</button>
        </div>
      </div>

      <div class="auth-status-box" id="auth-status-box"></div>
    </div>
  </main>

  <script src="auth.js"></script>
</body>
</html>
